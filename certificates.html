    <style>
        /* ADDED CSS FOR VERIFY BUTTON */
        .verify-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 24px;
            background-color: #1a1a1a; /* Dark professional color */
            color: #ffffff;
            text-decoration: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            border: 1px solid #1a1a1a;
        }

        .verify-btn:hover {
            background-color: transparent;
            color: #1a1a1a;
            transform: translateY(-2px);
        }

        /* Helper to center the button in your grid item */
        .gallery-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            /* Ensure you have some bottom spacing in your grid items */
            margin-bottom: 2rem; 
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar">
        <div class="logo-container">
            <a href="index.html" class="logo">ABID  <span>TS</span></a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#contact" class="nav-cta">Connect</a>
        </div>
    </nav>

   <section class="section gallery-section">
        <div class="container">
            <h2 class="section-tag">CREDENTIALS</h2>
            <h1 class="large-text italic">Professional Certifications</h1>
            
            <div class="gallery-grid" id="dynamic-certs-container"></div>
           
        </div>
    </section>

    <footer class="mini-footer">
        <div class="container">
            <p>© 2025 ABID TS — All certificates are authentic and verified.</p>
        </div>
    </footer>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
  apiKey: "AIzaSyDFhAFNC_veISpG4dH1C3Kfja_wqKpgpD0",
  authDomain: "portfolio-admin-54aae.firebaseapp.com",
  projectId: "portfolio-admin-54aae",
  storageBucket: "portfolio-admin-54aae.firebasestorage.app",
  messagingSenderId: "636634508521",
  appId: "1:636634508521:web:c213609daa0ed959429478",
  measurementId: "G-Z4EDSHZ0WD"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadCerts() {
        const container = document.getElementById('dynamic-certs-container');
        try {
            const q = query(collection(db, "certificates"), orderBy("date", "desc"));
            const querySnapshot = await getDocs(q);
            container.innerHTML = ""; 

            querySnapshot.forEach((doc) => {
                const cert = doc.data();
                container.insertAdjacentHTML('beforeend', `
                    <div class="gallery-item">
                        <div class="frame-container">
                            <img src="${cert.imageUrl}" alt="${cert.name}">
                        </div>
                        <p class="frame-label" style="margin-bottom: 5px;">${cert.name}</p>
                        
                        ${cert.date ? `<p style="font-size: 0.85rem; color: #888; font-weight: 600; margin-bottom: 10px;">${cert.date}</p>` : ''}
                        
                        ${cert.verifyLink ? `<a href="${cert.verifyLink}" class="verify-btn" target="_blank">Verify</a>` : ''}
                    </div>
                `);
            });
        } catch (error) { console.error(error); }
    }
    loadCerts();
</script>

</body>
</html>
