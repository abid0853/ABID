    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // PASTE YOUR CONFIG HERE AGAIN
    const firebaseConfig = {
  apiKey: "AIzaSyDFhAFNC_veISpG4dH1C3Kfja_wqKpgpD0",
  authDomain: "portfolio-admin-54aae.firebaseapp.com",
  projectId: "portfolio-admin-54aae",
  storageBucket: "portfolio-admin-54aae.firebasestorage.app",
  messagingSenderId: "636634508521",
  appId: "1:636634508521:web:c213609daa0ed959429478",
  measurementId: "G-Z4EDSHZ0WD"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadProjects() {
        const container = document.getElementById('dynamic-projects-container');
        container.innerHTML = "<p>Loading projects...</p>"; // Loading state

        try {
            // Get projects sorted by creation date
            const q = query(collection(db, "projects"), orderBy("date", "desc"));
            const querySnapshot = await getDocs(q);
            
            container.innerHTML = ""; // Clear loading state

            querySnapshot.forEach((doc) => {
                const project = doc.data();
                
                // Set up the dynamic GitHub buttons (Defaults to 'GitHub' if name is left blank)
                const git1Url = project.githubLink1 || project.githubLink || ''; 
                const git1Name = project.githubName1 || 'GitHub';
                
                const git2Url = project.githubLink2 || '';
                const git2Name = project.githubName2 || 'GitHub';
                
                // Build the HTML template string
                const cardHTML = `
                    <div class="project-card">
                        <div class="project-img-wrapper">
                            <img src="${project.imageUrl}" alt="${project.title}">
                        </div>
                        <div class="project-content">
                            <h3 class="project-title">${project.title}</h3>
                            ${project.date ? `<p style="font-size: 0.8rem; color: #888; font-weight: 800; margin-bottom: 5px;">COMPLETED: ${project.date}</p>` : ''}
                            <p class="project-tech">${project.techStack}</p>
                            <p class="project-desc">${project.description}</p>
                            <div class="hero-btns project-links" style="display: flex; flex-wrap: wrap; gap: 10px;">
                                ${project.liveLink ? `<a href="${project.liveLink}" target="_blank" class="btn-primary">View Live</a>` : ''}
                                ${git1Url ? `<a href="${git1Url}" target="_blank" class="btn-primary btn-secondary">${git1Name}</a>` : ''}
                                ${git2Url ? `<a href="${git2Url}" target="_blank" class="btn-primary">${git2Name}</a>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                // Inject it into the page
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        } catch (error) {
            console.error("Error fetching projects: ", error);
            container.innerHTML = "<p>Failed to load projects.</p>";
        }
    }

    // Run the function when page loads
    loadProjects();
</script>
